<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Evil Trivia - Film Fest</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; padding: 0; }
    body {
      font-family: 'Press Start 2P', cursive;
      background: linear-gradient(180deg, #1a0a0a 0%, #2d1016 100%);
      color: #fff;
      touch-action: manipulation;
      user-select: none;
      display: flex;
      flex-direction: column;
    }
    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 700px;
      width: 100%;
      margin: 0 auto;
      padding: 20px;
      position: relative;
      overflow-y: auto;
    }
    h1 {
      text-align: center;
      color: #FFD700;
      margin-bottom: 10px;
      font-size: 22px;
      line-height: 1.5;
      text-shadow: 0 0 10px #FFD700, 0 0 20px #FFD700;
    }
    .subtitle {
      text-align: center;
      color: #E94560;
      margin-bottom: 20px;
      font-size: 10px;
      line-height: 1.8;
      text-shadow: 0 0 10px #E94560;
    }
    .card {
      background: #2d1016;
      border: 4px solid #FFD700;
      padding: 25px;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
      margin-bottom: 20px;
      position: relative;
    }
    .setup-form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }
    .form-group { width: 100%; max-width: 450px; }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 10px;
      color: #FFD700;
      text-shadow: 0 0 10px #FFD700;
    }
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px;
      font-size: 12px;
      font-family: 'Press Start 2P', cursive;
      border: 3px solid #FFD700;
      background: #1a0a0a;
      color: #fff;
      box-sizing: border-box;
    }
    .form-group input:focus,
    .form-group select:focus {
      outline: 3px solid #E94560;
      box-shadow: 0 0 15px #E94560;
    }
    .btn {
      padding: 15px 25px;
      background-color: #FFD700;
      color: #1a0a0a;
      border: 3px solid #E94560;
      cursor: pointer;
      font-size: 12px;
      font-family: 'Press Start 2P', cursive;
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
      transition: all 0.1s;
      font-weight: bold;
    }
    .btn:hover {
      background-color: #FFE44D;
      box-shadow: 0 0 25px rgba(255, 215, 0, 0.8);
      transform: scale(1.05);
    }
    .btn:active { transform: scale(0.95); }
    .btn:disabled {
      background-color: #666;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }
    .btn-danger {
      background-color: #E94560;
      color: #fff;
      border-color: #FFD700;
    }
    .btn-danger:hover {
      background-color: #ff5a75;
      box-shadow: 0 0 25px rgba(233, 69, 96, 0.8);
    }
    .button-group {
      display: flex;
      gap: 15px;
      margin-top: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .upload-area {
      border: 3px dashed #FFD700;
      padding: 30px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: rgba(255, 215, 0, 0.05);
      margin-top: 5px;
    }
    .upload-area:hover {
      background: rgba(255, 215, 0, 0.1);
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
    }
    .upload-area.dragover {
      background: rgba(255, 215, 0, 0.2);
      border-color: #E94560;
    }
    .upload-icon { font-size: 40px; margin-bottom: 10px; }
    .upload-text { font-size: 9px; color: #FFD700; line-height: 2; }
    .upload-hint { font-size: 7px; color: #999; margin-top: 8px; line-height: 1.8; }
    #fileInput { display: none; }

    .progress-bar-container {
      width: 100%;
      height: 30px;
      background: #1a0a0a;
      border: 3px solid #FFD700;
      margin-top: 15px;
      display: none;
      position: relative;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #E94560, #FFD700);
      width: 0%;
      transition: width 0.3s;
    }
    .progress-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 8px;
      color: #fff;
      text-shadow: 0 0 5px #000;
    }

    .video-preview {
      margin-top: 15px;
      display: none;
      text-align: center;
    }
    .video-preview video {
      max-width: 100%;
      max-height: 300px;
      border: 3px solid #FFD700;
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
    }
    .video-info {
      font-size: 8px;
      color: #FFD700;
      margin-top: 10px;
      line-height: 1.8;
    }

    .message {
      padding: 15px;
      margin-top: 15px;
      font-size: 9px;
      line-height: 1.8;
      text-align: center;
      display: none;
    }
    .message-success {
      background: rgba(0, 255, 0, 0.15);
      border: 3px solid #0f0;
      color: #0f0;
      text-shadow: 0 0 5px #0f0;
    }
    .message-error {
      background: rgba(255, 0, 0, 0.15);
      border: 3px solid #f00;
      color: #f00;
      text-shadow: 0 0 5px #f00;
    }
    .message-warning {
      background: rgba(255, 200, 0, 0.15);
      border: 3px solid #FFD700;
      color: #FFD700;
      text-shadow: 0 0 5px #FFD700;
    }

    .existing-video-section {
      display: none;
      margin-top: 15px;
      padding: 15px;
      background: rgba(233, 69, 96, 0.1);
      border: 3px solid #E94560;
    }
    .existing-video-section h3 {
      font-size: 10px;
      color: #E94560;
      text-shadow: 0 0 5px #E94560;
      margin-bottom: 10px;
    }
    .existing-video-section video {
      max-width: 100%;
      max-height: 200px;
      border: 2px solid #E94560;
    }
    .existing-title {
      font-size: 9px;
      color: #FFD700;
      margin-top: 8px;
      line-height: 1.5;
    }

    .hidden { display: none; }

    @media (max-width: 600px) {
      h1 { font-size: 16px; }
      .subtitle { font-size: 8px; }
      .card { padding: 15px; }
      .btn { font-size: 10px; padding: 12px 20px; }
      .upload-area { padding: 20px; }
      .upload-icon { font-size: 30px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎬 FILM FEST 🎬</h1>
    <div class="subtitle">
      Upload your team's short film (20 seconds max)!
    </div>

    <div class="card">
      <div id="setupForm" class="setup-form">
        <div class="form-group">
          <label for="barLocation">BAR LOCATION:</label>
          <select id="barLocation" onchange="onLocationChange()">
            <option value="">Select location...</option>
            <option value="St. Dymphna's">St. Dymphna's</option>
            <option value="Radegast Hall">Radegast Hall</option>
          </select>
        </div>

        <div class="form-group">
          <label for="teamSelect">SELECT TEAM:</label>
          <select id="teamSelect" onchange="onTeamChange()">
            <option value="">Loading teams...</option>
          </select>
        </div>

        <div id="existingVideoSection" class="existing-video-section">
          <h3>⚠️ YOUR TEAM ALREADY HAS A VIDEO</h3>
          <div id="existingVideoTitle" class="existing-title"></div>
          <video id="existingVideoPlayer" controls playsinline></video>
          <p style="font-size: 8px; color: #E94560; margin-top: 10px; line-height: 1.8;">
            Uploading a new video will REPLACE this one!
          </p>
        </div>

        <div class="form-group">
          <label for="filmTitle">FILM TITLE:</label>
          <input type="text" id="filmTitle" placeholder="Name your masterpiece..." maxlength="80">
        </div>

        <div class="form-group">
          <label>YOUR VIDEO:</label>
          <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">🎥</div>
            <div class="upload-text">TAP TO SELECT VIDEO</div>
            <div class="upload-hint">or drag and drop here<br>Max 20 seconds &bull; MP4/MOV/WebM</div>
          </div>
          <input type="file" id="fileInput" accept="video/mp4,video/quicktime,video/webm,video/*" onchange="handleFileSelect(event)">
        </div>

        <div id="videoPreview" class="video-preview">
          <video id="previewPlayer" controls playsinline></video>
          <div class="video-info">
            <span id="previewFileName"></span> &bull;
            <span id="previewDuration"></span>s &bull;
            <span id="previewSize"></span>
          </div>
          <div class="button-group" style="margin-top: 10px;">
            <button class="btn btn-danger" onclick="clearFile()" style="font-size: 9px; padding: 10px 15px;">REMOVE</button>
          </div>
        </div>

        <div class="progress-bar-container" id="progressContainer">
          <div class="progress-bar" id="progressBar"></div>
          <div class="progress-text" id="progressText">0%</div>
        </div>

        <div id="messageBox" class="message"></div>

        <div class="button-group">
          <button class="btn" id="uploadBtn" onclick="uploadVideo()" disabled>UPLOAD VIDEO</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.2/firebase-app.js";
    import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/9.17.2/firebase-database.js";
    import { getStorage, ref as storageRef, uploadBytesResumable, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/9.17.2/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBruAY3SH0eO000LrYqwcOGXNaUuznoMkc",
      authDomain: "eviltrivia-47664.firebaseapp.com",
      databaseURL: "https://eviltrivia-47664-default-rtdb.firebaseio.com",
      projectId: "eviltrivia-47664",
      storageBucket: "eviltrivia-47664.firebaseapp.com",
      messagingSenderId: "401826818140",
      appId: "1:401826818140:web:c1df0bf4c602cc48231e99",
      measurementId: "G-2W6RK96Y34"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const storage = getStorage(app);
    window.db = db;
    window.storage = storage;
    window.dbRef = ref;
    window.dbGet = get;
    window.dbSet = set;
    window.storageRef = storageRef;
    window.uploadBytesResumable = uploadBytesResumable;
    window.getDownloadURL = getDownloadURL;
    window.deleteObject = deleteObject;
  </script>

  <script>
    let selectedFile = null;
    let videoDuration = 0;
    const MAX_DURATION = 20;

    function sanitizeKey(str) {
      return str.replace(/[.#$\[\]\/]/g, '_').replace(/'/g, '_');
    }

    async function onLocationChange() {
      const location = document.getElementById('barLocation').value;
      const teamSelect = document.getElementById('teamSelect');

      if (!location) {
        teamSelect.innerHTML = '<option value="">Select location first</option>';
        hideExistingVideo();
        return;
      }

      await loadTeamsForLocation(location);
    }

    async function loadTeamsForLocation(location) {
      const teamSelect = document.getElementById('teamSelect');
      teamSelect.innerHTML = '<option value="">Loading...</option>';

      try {
        const snap = await window.dbGet(window.dbRef(window.db, 'games/filmfest/activeSessions'));
        if (!snap.exists()) {
          teamSelect.innerHTML = '<option value="">No active sessions - contact admin</option>';
          return;
        }

        const sessions = snap.val();
        let sessionData = null;
        for (const key in sessions) {
          if (sessions[key].location === location) {
            sessionData = sessions[key];
            break;
          }
        }

        if (!sessionData || !sessionData.teams || sessionData.teams.length === 0) {
          teamSelect.innerHTML = '<option value="">No active session for this location</option>';
          return;
        }

        teamSelect.innerHTML = '<option value="">Select your team...</option>';
        sessionData.teams.sort().forEach(name => {
          const opt = document.createElement('option');
          opt.value = name;
          opt.textContent = name;
          teamSelect.appendChild(opt);
        });
      } catch (err) {
        console.error('Error loading teams:', err);
        teamSelect.innerHTML = '<option value="">Error loading teams</option>';
      }
    }

    async function onTeamChange() {
      const teamName = document.getElementById('teamSelect').value;
      const barLocation = document.getElementById('barLocation').value;
      if (!teamName || !barLocation) {
        hideExistingVideo();
        return;
      }
      await checkExistingVideo(barLocation, teamName);
    }

    async function checkExistingVideo(barLocation, teamName) {
      const videoKey = sanitizeKey(barLocation) + '_' + sanitizeKey(teamName);
      try {
        const snap = await window.dbGet(window.dbRef(window.db, `games/filmfest/videos/${videoKey}`));
        if (snap.exists()) {
          const data = snap.val();
          showExistingVideo(data);
        } else {
          hideExistingVideo();
        }
      } catch (err) {
        console.error('Error checking existing video:', err);
        hideExistingVideo();
      }
    }

    function showExistingVideo(data) {
      const section = document.getElementById('existingVideoSection');
      const player = document.getElementById('existingVideoPlayer');
      const titleEl = document.getElementById('existingVideoTitle');
      section.style.display = 'block';
      titleEl.textContent = '🎬 "' + data.title + '"';
      player.src = data.videoUrl;
    }

    function hideExistingVideo() {
      document.getElementById('existingVideoSection').style.display = 'none';
      document.getElementById('existingVideoPlayer').src = '';
    }

    function handleFileSelect(e) {
      const file = e.target.files[0];
      if (!file) return;

      if (!file.type.startsWith('video/')) {
        showMessage('Please select a video file.', 'error');
        return;
      }

      const sizeMB = file.size / (1024 * 1024);
      if (sizeMB > 100) {
        showMessage('File too large. Please keep it under 100MB.', 'error');
        return;
      }

      validateAndPreview(file);
    }

    function validateAndPreview(file) {
      const video = document.createElement('video');
      video.preload = 'metadata';

      video.onloadedmetadata = function () {
        window.URL.revokeObjectURL(video.src);
        videoDuration = video.duration;

        if (videoDuration > MAX_DURATION) {
          showMessage(
            `Video is ${videoDuration.toFixed(1)}s - must be ${MAX_DURATION} seconds or less! Trim it down and try again.`,
            'error'
          );
          clearFile();
          return;
        }

        selectedFile = file;
        showPreview(file, videoDuration);
        updateUploadButton();
        hideMessage();
      };

      video.onerror = function () {
        showMessage('Could not read video file. Try a different format.', 'error');
      };

      video.src = URL.createObjectURL(file);
    }

    function showPreview(file, duration) {
      const preview = document.getElementById('videoPreview');
      const player = document.getElementById('previewPlayer');
      const fileName = document.getElementById('previewFileName');
      const durationEl = document.getElementById('previewDuration');
      const sizeEl = document.getElementById('previewSize');

      player.src = URL.createObjectURL(file);
      fileName.textContent = file.name;
      durationEl.textContent = duration.toFixed(1);
      sizeEl.textContent = (file.size / (1024 * 1024)).toFixed(1) + 'MB';
      preview.style.display = 'block';

      document.getElementById('uploadArea').style.display = 'none';
    }

    function clearFile() {
      selectedFile = null;
      videoDuration = 0;
      document.getElementById('fileInput').value = '';
      document.getElementById('videoPreview').style.display = 'none';
      document.getElementById('previewPlayer').src = '';
      document.getElementById('uploadArea').style.display = 'block';
      updateUploadButton();
    }

    function updateUploadButton() {
      const btn = document.getElementById('uploadBtn');
      const teamName = document.getElementById('teamSelect').value;
      const barLocation = document.getElementById('barLocation').value;
      const title = document.getElementById('filmTitle').value.trim();
      btn.disabled = !(selectedFile && teamName && barLocation && title);
    }

    document.getElementById('filmTitle').addEventListener('input', updateUploadButton);

    async function uploadVideo() {
      const teamName = document.getElementById('teamSelect').value;
      const barLocation = document.getElementById('barLocation').value;
      const title = document.getElementById('filmTitle').value.trim();

      if (!selectedFile || !teamName || !barLocation || !title) {
        showMessage('Please fill in all fields and select a video.', 'error');
        return;
      }

      if (videoDuration > MAX_DURATION) {
        showMessage(`Video is too long (${videoDuration.toFixed(1)}s). Max is ${MAX_DURATION}s.`, 'error');
        return;
      }

      const videoKey = sanitizeKey(barLocation) + '_' + sanitizeKey(teamName);

      const existingSnap = await window.dbGet(window.dbRef(window.db, `games/filmfest/videos/${videoKey}`));
      if (existingSnap.exists()) {
        if (!confirm('Your team already has a video uploaded. Uploading now will REPLACE your existing video. Continue?')) {
          return;
        }
        try {
          const oldData = existingSnap.val();
          if (oldData.storagePath) {
            const oldRef = window.storageRef(window.storage, oldData.storagePath);
            await window.deleteObject(oldRef).catch(() => {});
          }
        } catch (e) {
          console.warn('Could not delete old file:', e);
        }
      }

      const uploadBtn = document.getElementById('uploadBtn');
      uploadBtn.disabled = true;
      uploadBtn.textContent = 'UPLOADING...';

      const progressContainer = document.getElementById('progressContainer');
      const progressBar = document.getElementById('progressBar');
      const progressText = document.getElementById('progressText');
      progressContainer.style.display = 'block';

      const ext = selectedFile.name.split('.').pop() || 'mp4';
      const storagePath = `filmfest/videos/${videoKey}.${ext}`;
      const fileRef = window.storageRef(window.storage, storagePath);

      const uploadTask = window.uploadBytesResumable(fileRef, selectedFile, {
        contentType: selectedFile.type
      });

      uploadTask.on('state_changed',
        (snapshot) => {
          const pct = Math.round((snapshot.bytesTransferred / snapshot.totalBytes) * 100);
          progressBar.style.width = pct + '%';
          progressText.textContent = pct + '%';
        },
        (error) => {
          console.error('Upload error:', error);
          showMessage('Upload failed: ' + error.message, 'error');
          uploadBtn.disabled = false;
          uploadBtn.textContent = 'UPLOAD VIDEO';
          progressContainer.style.display = 'none';
        },
        async () => {
          try {
            const downloadUrl = await window.getDownloadURL(fileRef);

            const videoData = {
              teamName: teamName,
              barLocation: barLocation,
              title: title,
              videoUrl: downloadUrl,
              storagePath: storagePath,
              duration: Math.round(videoDuration * 10) / 10,
              timestamp: Date.now(),
              date: new Date().toISOString().split('T')[0]
            };

            await window.dbSet(window.dbRef(window.db, `games/filmfest/videos/${videoKey}`), videoData);

            showMessage('🎬 Video uploaded successfully! Your film "' + title + '" is now in the festival!', 'success');
            progressBar.style.width = '100%';
            progressText.textContent = 'DONE!';

            uploadBtn.textContent = 'UPLOAD VIDEO';
            uploadBtn.disabled = true;

            await checkExistingVideo(barLocation, teamName);

          } catch (err) {
            console.error('Error saving metadata:', err);
            showMessage('Video uploaded but failed to save info: ' + err.message, 'error');
            uploadBtn.disabled = false;
            uploadBtn.textContent = 'UPLOAD VIDEO';
          }
        }
      );
    }

    function showMessage(text, type) {
      const box = document.getElementById('messageBox');
      box.style.display = 'block';
      box.textContent = text;
      box.className = 'message message-' + type;
    }

    function hideMessage() {
      document.getElementById('messageBox').style.display = 'none';
    }

    // Drag and drop
    const uploadArea = document.getElementById('uploadArea');
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });
    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });
    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('video/')) {
        validateAndPreview(file);
      } else {
        showMessage('Please drop a video file.', 'error');
      }
    });

    window.onLocationChange = onLocationChange;
    window.onTeamChange = onTeamChange;
    window.handleFileSelect = handleFileSelect;
    window.clearFile = clearFile;
    window.uploadVideo = uploadVideo;
  </script>
</body>
</html>
