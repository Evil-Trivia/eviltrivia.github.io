<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Evil Trivia - Film Fest Voting</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; min-height: 100%; }
    body {
      font-family: 'Press Start 2P', cursive;
      background: linear-gradient(180deg, #1a0a0a 0%, #2d1016 50%, #1a0a0a 100%);
      color: #fff;
    }
    .container {
      max-width: 1000px;
      width: 100%;
      margin: 0 auto;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #FFD700;
      margin-bottom: 8px;
      font-size: 22px;
      line-height: 1.5;
      text-shadow: 0 0 10px #FFD700, 0 0 20px #FFD700;
    }
    .subtitle {
      text-align: center;
      color: #E94560;
      margin-bottom: 25px;
      font-size: 10px;
      line-height: 1.8;
      text-shadow: 0 0 10px #E94560;
    }
    .vote-banner {
      text-align: center;
      padding: 15px;
      background: rgba(255, 215, 0, 0.1);
      border: 3px solid #FFD700;
      margin-bottom: 25px;
      font-size: 9px;
      color: #FFD700;
      line-height: 1.8;
      text-shadow: 0 0 5px #FFD700;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
    }
    .vote-banner .current-vote {
      color: #0f0;
      text-shadow: 0 0 10px #0f0;
      font-size: 10px;
      margin-top: 8px;
    }

    .closed-message {
      text-align: center;
      padding: 60px 30px;
      background: rgba(233, 69, 96, 0.1);
      border: 4px solid #E94560;
      margin: 40px auto;
      max-width: 600px;
      box-shadow: 0 0 30px rgba(233, 69, 96, 0.3);
    }
    .closed-message h2 {
      color: #FFD700;
      font-size: 18px;
      text-shadow: 0 0 10px #FFD700;
      margin-bottom: 15px;
    }
    .closed-message p {
      color: #E94560;
      font-size: 10px;
      line-height: 2;
      text-shadow: 0 0 5px #E94560;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 25px;
    }
    .video-card {
      background: #2d1016;
      border: 4px solid #FFD700;
      padding: 0;
      box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
      transition: all 0.2s;
      overflow: hidden;
    }
    .video-card:hover {
      box-shadow: 0 0 25px rgba(255, 215, 0, 0.5);
      transform: translateY(-3px);
    }
    .video-card.voted {
      border-color: #0f0;
      box-shadow: 0 0 20px rgba(0, 255, 0, 0.4);
    }
    .video-card video {
      width: 100%;
      display: block;
      background: #000;
      max-height: 250px;
    }
    .video-card-body {
      padding: 15px;
    }
    .video-card-title {
      font-size: 11px;
      color: #FFD700;
      text-shadow: 0 0 5px #FFD700;
      margin-bottom: 8px;
      line-height: 1.5;
    }
    .video-card-team {
      font-size: 9px;
      color: #E94560;
      text-shadow: 0 0 5px #E94560;
      line-height: 1.5;
      margin-bottom: 5px;
    }
    .video-card-location {
      font-size: 7px;
      color: #999;
      margin-bottom: 12px;
    }
    .vote-section {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 10px;
      border-top: 2px solid rgba(255, 215, 0, 0.2);
    }
    .vote-count-display {
      font-size: 12px;
      color: #FFD700;
      text-shadow: 0 0 5px #FFD700;
    }
    .vote-btn {
      padding: 10px 20px;
      font-size: 9px;
      font-family: 'Press Start 2P', cursive;
      background: #FFD700;
      color: #1a0a0a;
      border: 3px solid #E94560;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
      transition: all 0.1s;
      font-weight: bold;
    }
    .vote-btn:hover {
      background: #FFE44D;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
      transform: scale(1.05);
    }
    .vote-btn:active { transform: scale(0.95); }
    .vote-btn.voted {
      background: #0f0;
      color: #000;
      border-color: #0f0;
      box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
    }
    .vote-btn:disabled {
      background: #555;
      color: #999;
      cursor: not-allowed;
      box-shadow: none;
      border-color: #555;
      transform: none;
    }

    .loading {
      text-align: center;
      padding: 60px;
      font-size: 12px;
      color: #FFD700;
      text-shadow: 0 0 10px #FFD700;
      line-height: 2;
    }
    .no-videos {
      text-align: center;
      padding: 60px;
      font-size: 12px;
      color: #E94560;
      text-shadow: 0 0 10px #E94560;
      line-height: 2;
    }

    @keyframes sparkle {
      0%, 100% { text-shadow: 0 0 10px #FFD700, 0 0 20px #FFD700; }
      50% { text-shadow: 0 0 20px #FFD700, 0 0 40px #FFD700, 0 0 60px #E94560; }
    }

    .hidden { display: none; }

    @media (max-width: 600px) {
      h1 { font-size: 16px; }
      .subtitle { font-size: 8px; }
      .video-grid { grid-template-columns: 1fr; }
      .vote-btn { font-size: 8px; padding: 8px 15px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎬 FILM FEST 🎬</h1>
    <div class="subtitle">Watch &amp; vote for your favorite short film!</div>

    <div id="closedMessage" class="closed-message hidden">
      <h2>🎬 COMING SOON 🎬</h2>
      <p>Voting hasn't opened yet.<br>Check back soon!</p>
    </div>

    <div id="votingArea" class="hidden">
      <div class="vote-banner" id="voteBanner">
        Pick your favorite film! You get <strong>ONE</strong> vote.
        <div class="current-vote" id="currentVoteDisplay" style="display: none;"></div>
      </div>

      <div id="loadingMessage" class="loading">Loading films...</div>
      <div id="noVideosMessage" class="no-videos hidden">No films have been submitted yet. Check back soon!</div>
      <div id="videoGrid" class="video-grid"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.2/firebase-app.js";
    import { getDatabase, ref, get, set, remove, onValue } from "https://www.gstatic.com/firebasejs/9.17.2/firebase-database.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.17.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBruAY3SH0eO000LrYqwcOGXNaUuznoMkc",
      authDomain: "eviltrivia-47664.firebaseapp.com",
      databaseURL: "https://eviltrivia-47664-default-rtdb.firebaseio.com",
      projectId: "eviltrivia-47664",
      storageBucket: "eviltrivia-47664.firebasestorage.app",
      messagingSenderId: "401826818140",
      appId: "1:401826818140:web:c1df0bf4c602cc48231e99",
      measurementId: "G-2W6RK96Y34"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    window.db = db;
    window.dbRef = ref;
    window.dbGet = get;
    window.dbSet = set;
    window.dbRemove = remove;
    window.dbOnValue = onValue;

    let voterId = null;
    let currentVoteKey = null;
    let allVideoData = {};

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }

    function shuffleArray(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    async function init() {
      try {
        await signInAnonymously(auth);
      } catch (e) {
        console.warn('Anonymous auth failed:', e);
      }

      onAuthStateChanged(auth, async (user) => {
        if (user) {
          voterId = user.uid;
        } else {
          voterId = 'fallback_' + (localStorage.getItem('filmfest_voter_id') ||
            (() => { const id = Date.now() + '_' + Math.random().toString(36).substr(2, 9); localStorage.setItem('filmfest_voter_id', id); return id; })());
        }

        try {
          const votingSnap = await get(ref(db, 'games/filmfest/settings/votingOpen'));
          const isOpen = votingSnap.exists() && votingSnap.val() === true;

          if (!isOpen) {
            document.getElementById('closedMessage').classList.remove('hidden');
            document.getElementById('votingArea').classList.add('hidden');
            return;
          }

          document.getElementById('closedMessage').classList.add('hidden');
          document.getElementById('votingArea').classList.remove('hidden');

          await loadCurrentVote();
          await loadVideos();
          listenForVoteUpdates();
        } catch (error) {
          console.error('Init error:', error);
          document.getElementById('loadingMessage').textContent = 'Error loading. Please refresh the page.';
        }
      });
    }

    async function loadCurrentVote() {
      try {
        const votesSnap = await get(ref(db, 'games/filmfest/votes'));
        if (!votesSnap.exists()) return;

        const allVotes = votesSnap.val();
        for (const [videoKey, voters] of Object.entries(allVotes)) {
          if (voters[voterId]) {
            currentVoteKey = videoKey;
            break;
          }
        }
      } catch (error) {
        console.error('Error loading current vote:', error);
      }
    }

    async function loadVideos() {
      const grid = document.getElementById('videoGrid');
      const loading = document.getElementById('loadingMessage');
      const noVids = document.getElementById('noVideosMessage');

      try {
        const videosSnap = await get(ref(db, 'games/filmfest/videos'));
        const votesSnap = await get(ref(db, 'games/filmfest/votes'));
        const votes = votesSnap.exists() ? votesSnap.val() : {};

        loading.classList.add('hidden');

        if (!videosSnap.exists()) {
          noVids.classList.remove('hidden');
          return;
        }

        allVideoData = videosSnap.val();
        let videoList = Object.entries(allVideoData).map(([key, data]) => ({
          key, ...data,
          voteCount: votes[key] ? Object.keys(votes[key]).length : 0
        }));

        videoList = shuffleArray(videoList);

        if (videoList.length === 0) {
          noVids.classList.remove('hidden');
          return;
        }

        grid.innerHTML = '';
        videoList.forEach(v => {
          const isVoted = currentVoteKey === v.key;
          const card = document.createElement('div');
          card.className = 'video-card' + (isVoted ? ' voted' : '');
          card.id = 'card-' + v.key;
          card.innerHTML = `
            <video controls playsinline preload="metadata" src="${escapeHtml(v.videoUrl)}"></video>
            <div class="video-card-body">
              <div class="video-card-title">${escapeHtml(v.title)}</div>
              <div class="video-card-team">${escapeHtml(v.teamName)}</div>
              <div class="video-card-location">${escapeHtml(v.barLocation)}</div>
              <div class="vote-section">
                <span class="vote-count-display" id="votes-${v.key}">&#x1F5F3;&#xFE0F; ${v.voteCount}</span>
                <button class="vote-btn${isVoted ? ' voted' : ''}" id="votebtn-${v.key}" data-key="${v.key}">
                  ${isVoted ? '&#x2713; VOTED' : 'VOTE'}
                </button>
              </div>
            </div>
          `;
          grid.appendChild(card);
        });

        grid.addEventListener('click', (e) => {
          const btn = e.target.closest('.vote-btn');
          if (btn) castVote(btn.dataset.key);
        });

        updateCurrentVoteDisplay();

      } catch (error) {
        console.error('Error loading videos:', error);
        loading.textContent = 'Error loading films. Please refresh.';
      }
    }

    async function castVote(videoKey) {
      if (currentVoteKey === videoKey) {
        if (!confirm('Remove your vote for this film?')) return;
        try {
          await remove(ref(db, `games/filmfest/votes/${videoKey}/${voterId}`));
          currentVoteKey = null;
          refreshVoteUI();
          updateCurrentVoteDisplay();
        } catch (error) {
          console.error('Error removing vote:', error);
          alert('Error removing vote. Try again.');
        }
        return;
      }

      if (currentVoteKey) {
        const oldVideo = allVideoData[currentVoteKey];
        const oldName = oldVideo ? oldVideo.title : 'your current choice';
        if (!confirm(`Switch your vote? You currently voted for "${oldName}".`)) return;
        try {
          await remove(ref(db, `games/filmfest/votes/${currentVoteKey}/${voterId}`));
        } catch (e) {
          console.warn('Error removing old vote:', e);
        }
      }

      try {
        await set(ref(db, `games/filmfest/votes/${videoKey}/${voterId}`), { timestamp: Date.now() });
        currentVoteKey = videoKey;
        refreshVoteUI();
        updateCurrentVoteDisplay();
      } catch (error) {
        console.error('Error casting vote:', error);
        alert('Error voting. Please try again.');
      }
    }

    function refreshVoteUI() {
      document.querySelectorAll('.video-card').forEach(card => {
        const key = card.id.replace('card-', '');
        const btn = document.getElementById('votebtn-' + key);
        const isVoted = currentVoteKey === key;

        card.className = 'video-card' + (isVoted ? ' voted' : '');
        if (btn) {
          btn.className = 'vote-btn' + (isVoted ? ' voted' : '');
          btn.innerHTML = isVoted ? '&#x2713; VOTED' : 'VOTE';
        }
      });
    }

    function updateCurrentVoteDisplay() {
      const display = document.getElementById('currentVoteDisplay');
      if (currentVoteKey && allVideoData[currentVoteKey]) {
        display.textContent = '\u2713 Your vote: "' + allVideoData[currentVoteKey].title + '"';
        display.style.display = 'block';
      } else {
        display.style.display = 'none';
      }
    }

    function listenForVoteUpdates() {
      onValue(ref(db, 'games/filmfest/votes'), (snapshot) => {
        const votes = snapshot.exists() ? snapshot.val() : {};
        document.querySelectorAll('.vote-count-display').forEach(el => {
          const key = el.id.replace('votes-', '');
          const count = votes[key] ? Object.keys(votes[key]).length : 0;
          el.innerHTML = '&#x1F5F3;&#xFE0F; ' + count;
        });
      });
    }

    window.castVote = castVote;
    init();
  </script>
</body>
</html>
