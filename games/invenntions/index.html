    function roundedRectPath(x, y, w, h, radius) {
      const r = Math.min(radius, w / 2, h / 2);
      if (w <= 0 || h <= 0) return '';
      return [
        `M ${x + r} ${y}`,
        `H ${x + w - r}`,
        `Q ${x + w} ${y} ${x + w} ${y + r}`,
        `V ${y + h - r}`,
        `Q ${x + w} ${y + h} ${x + w - r} ${y + h}`,
        `H ${x + r}`,
        `Q ${x} ${y + h} ${x} ${y + h - r}`,
        `V ${y + r}`,
        `Q ${x} ${y} ${x + r} ${y}`,
        'Z'
      ].join(' ');
    }

    function layoutSquirclePaths() {
      const stage = document.querySelector('.inv-logo-stage');
      const logo = document.getElementById('invLogo');
      const pathA = document.getElementById('invSquircleA');
      const pathB = document.getElementById('invSquircleB');
      const pathC = document.getElementById('invSquircleC');
      const pathVennFill = document.getElementById('invSquircleVennFill');
      if (!stage || !logo || !pathA || !pathB || !pathC || !pathVennFill) return false;

      const stageRect = stage.getBoundingClientRect();
      const pad = 5;
      const corner = Math.max(10, Math.min(14, stageRect.width * 0.028));

      function boundsForCluster(selector) {
        const els = logo.querySelectorAll(selector);
        if (!els.length) return null;
        let minX = Infinity;
        let minY = Infinity;
        let maxX = -Infinity;
        let maxY = -Infinity;
        els.forEach(el => {
          const b = el.getBoundingClientRect();
          if (!b.width && !b.height) return;
          minX = Math.min(minX, b.left);
          minY = Math.min(minY, b.top);
          maxX = Math.max(maxX, b.right);
          maxY = Math.max(maxY, b.bottom);
        });
        if (!isFinite(minX)) return null;
        return {
          x: minX - stageRect.left - pad,
          y: minY - stageRect.top - pad,
          w: maxX - minX + pad * 2,
          h: maxY - minY + pad * 2
        };
      }

      const sw = Math.max(stage.offsetWidth, 1);
      const sh = Math.max(stage.offsetHeight, 1);
      const svgStrokes = document.getElementById('invSquircleSvg');
      const svgFill = document.getElementById('invSquircleSvgFill');
      const viewBox = `0 0 ${sw} ${sh}`;
      if (svgStrokes) svgStrokes.setAttribute('viewBox', viewBox);
      if (svgFill) svgFill.setAttribute('viewBox', viewBox);

      const invenn = boundsForCluster('.inv-sq-invenn');
      const venntion = boundsForCluster('.inv-sq-venntions');
      const venn = boundsForCluster('.inv-sq-venn');
      if (!invenn || !venntion || !venn) return false;

      pathA.setAttribute('d', roundedRectPath(invenn.x, invenn.y, invenn.w, invenn.h, corner));
      pathB.setAttribute('d', roundedRectPath(venntion.x, venntion.y, venntion.w, venntion.h, corner));
      const vennPath = roundedRectPath(venn.x, venn.y, venn.w, venn.h, corner);
      pathC.setAttribute('d', vennPath);
      pathVennFill.setAttribute('d', vennPath);
      pathA.style.setProperty('--path-len', String(pathA.getTotalLength()));
      pathB.style.setProperty('--path-len', String(pathB.getTotalLength()));
      pathC.style.setProperty('--path-len', String(pathC.getTotalLength()));
      return true;
    }

    function getStageLayoutScale(stage) {
      if (!stage) return 1;
      const rect = stage.getBoundingClientRect();
      const ow = stage.offsetWidth;
      if (!ow || !rect.width) return 1;
      const s = rect.width / ow;
      return s > 0 ? s : 1;
    }

    function layoutPhraseSquirclePaths(block) {
      const stage = block.querySelector('.mg-main-row-wrap');
      const pathA = block.querySelector('.mg-phrase-sq-a');
      const pathB = block.querySelector('.mg-phrase-sq-b');
      const pathC = block.querySelector('.mg-phrase-sq-c');
      const left = block.querySelector('.mg-side-left');
      const center = block.querySelector('.mg-center');
      const right = block.querySelector('.mg-side-right');
      const svg = block.querySelector('.mg-phrase-sq-svg');
      if (!stage || !pathA || !pathB || !pathC || !left || !center || !right || !svg) return false;

      const stageRect = stage.getBoundingClientRect();
      const layoutScale = getStageLayoutScale(stage);
      const sqStroke = 2.5;
      const hs = sqStroke / 2;

      const sw = Math.max(stage.offsetWidth, 1);
      const sh = Math.max(stage.offsetHeight, 1);
      svg.setAttribute('viewBox', `0 0 ${sw} ${sh}`);

      const answerStrip = center.querySelector('.mg-answer-strip');
      const leftWords = left.querySelector('.mg-words');
      const rightWords = right.querySelector('.mg-words');
      if (!answerStrip || !leftWords || !rightWords) return false;

      function pathRectForEl(el) {
        const b = el.getBoundingClientRect();
        if (!b.width && !b.height) return null;
        const style = getComputedStyle(el);
        const br = parseFloat(style.borderTopLeftRadius) || 4;
        const x = (b.left - stageRect.left) / layoutScale + hs;
        const y = (b.top - stageRect.top) / layoutScale + hs;
        const w = b.width / layoutScale - sqStroke;
        const h = b.height / layoutScale - sqStroke;
        if (w <= 0 || h <= 0) return null;
        return { x, y, w, h, corner: Math.min(br, w / 2, h / 2) };
      }

      const leftBox = pathRectForEl(leftWords);
      const rightBox = pathRectForEl(rightWords);
      const venn = pathRectForEl(answerStrip);
      if (!leftBox || !rightBox || !venn) return false;

      const answerRaw = answerStrip.getBoundingClientRect();
      const answerLeft = (answerRaw.left - stageRect.left) / layoutScale;
      const answerRight = (answerRaw.right - stageRect.left) / layoutScale;

      const greenTop = Math.min(leftBox.y, venn.y);
      const greenBottom = Math.max(leftBox.y + leftBox.h, venn.y + venn.h);
      const greenH = greenBottom - greenTop;
      const greenW = (answerRight - hs) - leftBox.x;

      const blueTop = Math.min(rightBox.y, venn.y);
      const blueBottom = Math.max(rightBox.y + rightBox.h, venn.y + venn.h);
      const blueH = blueBottom - blueTop;
      const blueX = answerLeft + hs;
      const blueW = (rightBox.x + rightBox.w) - blueX;

      if (greenW <= 0 || greenH <= 0 || blueW <= 0 || blueH <= 0) return false;

      const invenn = {
        x: leftBox.x,
        y: greenTop,
        w: greenW,
        h: greenH,
        corner: Math.min(leftBox.corner, venn.corner, greenW / 4, greenH / 4)
      };

      const venntion = {
        x: blueX,
        y: blueTop,
        w: blueW,
        h: blueH,
        corner: Math.min(rightBox.corner, venn.corner, blueW / 4, blueH / 4)
      };

      pathA.setAttribute('d', roundedRectPath(invenn.x, invenn.y, invenn.w, invenn.h, invenn.corner));
      pathB.setAttribute('d', roundedRectPath(venntion.x, venntion.y, venntion.w, venntion.h, venntion.corner));
      pathC.setAttribute('d', roundedRectPath(venn.x, venn.y, venn.w, venn.h, venn.corner));
      pathA.style.setProperty('--path-len', String(pathA.getTotalLength()));
      pathB.style.setProperty('--path-len', String(pathB.getTotalLength()));
      pathC.style.setProperty('--path-len', String(pathC.getTotalLength()));
      return true;
    }

    function playPhraseSolveSquircle(phraseIndex, done) {
      const block = puzzleMount.querySelector(`.mg-phrase-block[data-phrase-i="${phraseIndex}"]`);
      if (!block) {
        done();
        return;
      }
      squircleAnimatingPhrase = phraseIndex;
      block.classList.remove('mg-phrase-sq-armed', 'mg-phrase-sq-venn', 'mg-phrase-sq-done');
      fitBoardToViewport();
      function finishAnim() {
        squircleAnimatingPhrase = -1;
        block.classList.add('mg-phrase-sq-armed', 'mg-phrase-sq-venn', 'mg-phrase-sq-done');
        layoutPhraseSquirclePaths(block);
        restoreSolvedPhraseSquircles();
        done();
      }
      function tryArm(attempt) {
        requestAnimationFrame(() => {
          if (!layoutPhraseSquirclePaths(block)) {
            if (attempt < 8) tryArm(attempt + 1);
            else finishAnim();
            return;
          }
          refreshAnswerStripFit();
          refreshClueHintTextFit(block);
          layoutPhraseSquirclePaths(block);
          void block.offsetWidth;
          block.classList.add('mg-phrase-sq-armed');
          setTimeout(() => {
            layoutPhraseSquirclePaths(block);
            block.classList.add('mg-phrase-sq-venn');
            setTimeout(finishAnim, SQUIRCLE_VENN_MS);
          }, PHRASE_SQUIRCLE_PAIR_MS);
        });
      }
      tryArm(0);
    }

    function whenLogoLayoutReady() {
      const logo = document.getElementById('invLogo');
      const screen = document.getElementById('titleScreen');
      if (!logo || !screen) return Promise.resolve();

      const imgWaits = [...logo.querySelectorAll('img')].map(img => {
        if (img.complete) return Promise.resolve();
        return new Promise(resolve => {
          img.addEventListener('load', resolve, { once: true });
          img.addEventListener('error', resolve, { once: true });
        });
      });

      const fontsReady = document.fonts && document.fonts.ready
        ? document.fonts.ready
        : Promise.resolve();

      return Promise.all([fontsReady, ...imgWaits]).then(() => new Promise(resolve => {
        const lastPiece = logo.querySelector('.inv-piece:last-child');
        const settle = () => {
          screen.classList.add('inv-pieces-settled');
          requestAnimationFrame(() => {
            requestAnimationFrame(resolve);
          });
        };
        if (lastPiece) {
          lastPiece.addEventListener('animationend', settle, { once: true });
          setTimeout(settle, 1050);
        } else {
          settle();
        }
      }));
    }

    async function loadArchiveCatalog() {
      archiveCatalog = [];
      const raw = await fetchArchiveRaw();
      if (!raw || typeof raw !== 'object') return;
      Object.keys(raw).forEach(id => {
        const r = raw[id];
        if (!r || r.hidden) return;
        const puzz = r.puzzles;
        const phraseCount = puzz
          ? (Array.isArray(puzz) ? puzz.length : Object.keys(puzz).length)
          : 0;
        if (!phraseCount) return;
        let playDate = r.playDate != null ? String(r.playDate).trim() : '';
        if (!playDate && r.updatedAt) {
          playDate = new Date(r.updatedAt).toISOString().split('T')[0];
        }
        if (!playDate) playDate = todayISO();
        const label = roundLabelFromBlock(r, id) || 'Round';
        const sessionKey = sessionKeyForRoundId(id);
        const submission = getSubmissionForRound(id);
        archiveCatalog.push({
          id,
          label,
          playDate,
          phraseCount,
          sessionKey,
          submission,
          playStatus: getRoundPlayStatus(id)
        });
      });
      archiveCatalog.sort((a, b) => {
        if (a.playDate !== b.playDate) return b.playDate.localeCompare(a.playDate);
        return a.label.localeCompare(b.label);
      });
      await enrichArchiveSubmissionRanks();
    }

    async function enrichArchiveSubmissionRanks() {
      const needsRank = archiveCatalog.some(e => e.submission && e.submission.submitted && e.submission.rank == null);
      if (!needsRank) return;
      try {
        const snap = await window.dbGet(window.dbRef(window.db, `publicAnswers/${GAME_ID}`));
        if (!snapExists(snap) || !snap.val()) return;
        const allRows = [];
        Object.keys(snap.val()).forEach(id => {
          const s = snap.val()[id];
          if (s && typeof s === 'object') allRows.push(s);
        });
        archiveCatalog.forEach(entry => {
          const sub = entry.submission;
          if (!sub || !sub.submitted || sub.rank != null) return;
          const rows = allRows.filter(s => scoreMatchesSessionKey(s, entry.sessionKey));
          sub.rank = computeRankFromRows(rows, sub.points, sub.elapsedMs);
          writeSubmissionForSession(entry.sessionKey, sub);
        });
      } catch (e) {
        console.warn('InVennTions archive rank enrich:', e);
      }
    }

    function formatArchiveStatus(status) {
      if (status.type === 'submitted') {
        const sub = status.submission;
        const pts = typeof sub.points === 'number' ? sub.points : '—';
        const time = typeof sub.elapsedMs === 'number' ? formatElapsedMs(sub.elapsedMs) : '—';
        const rank = sub.rank != null ? `#${sub.rank}` : '';
        const rankPart = rank ? `<span class="lb-icon" aria-hidden="true">🏆</span><span>${esc(rank)}</span><span>·</span>` : '';
        return `<span class="sub inv-archive-score">${rankPart}<span>${esc(String(pts))} pts</span><span>·</span><span>${esc(time)}</span></span>`;
      }
      if (status.type === 'in_progress') {
        return '<span class="sub inv-archive-in-progress">In progress</span>';
      }
      return '<span class="sub not-played">Not played</span>';
    }

    async function prefetchQuiz() {
      quizPrefetchOk = false;
      quizPrefetchError = '';
      liveRoundMeta = null;
      updateTitleMenuState();
      try {
        const archiveRaw = await fetchArchiveRaw();
        await loadQuizDataOnly(archiveRaw);

        quizPrefetchOk = false;
        quizPrefetchError = (e && e.message) ? e.message : 'Could not load the quiz.';

    function leaderboardPoints(s) {
      if (typeof s.points === 'number') return s.points;
      if (typeof s.correctCount === 'number') return s.correctCount;
      return s.correct ? 1 : 0;
    }

    function leaderboardElapsedMs(s) {
      if (typeof s.elapsedMs === 'number') return s.elapsedMs;
      if (typeof s.elapsedSeconds === 'number') return s.elapsedSeconds * 1000;
      return Number.MAX_SAFE_INTEGER;
    }

    function leaderboardTimeLabel(s) {
      const ms = leaderboardElapsedMs(s);
      return ms >= Number.MAX_SAFE_INTEGER ? '—' : formatElapsedMs(ms);
    }

    function scoreMatchesSessionKey(s, sessionKey) {
      if (!sessionKey || !s) return false;
      if (s.sessionKey != null && String(s.sessionKey) === sessionKey) return true;
      const wantRoundId = canonicalRoundIdFromSessionKey(sessionKey);
      if (!wantRoundId) return false;
      if (s.roundId && String(s.roundId) === wantRoundId) return true;
      const scoreRoundId = canonicalRoundIdFromSessionKey(s.sessionKey || '');
      if (scoreRoundId && scoreRoundId === wantRoundId) return true;
      const ids = scoreRoundIdsFromRecord(s);
      return ids.length === 1 && ids[0] === wantRoundId;
    }

    function scoreRoundIdsFromRecord(s) {
      if (s.roundId) return [String(s.roundId)];
      if (Array.isArray(s.roundIds) && s.roundIds.length) return s.roundIds.map(String);
      const rid = canonicalRoundIdFromSessionKey(s.sessionKey != null ? String(s.sessionKey) : '');
      return rid ? [rid] : [];
    }

    function sessionRoundIdsFromKey(sessionKey) {
      const rid = canonicalRoundIdFromSessionKey(sessionKey);
      return rid ? [rid] : [];
    }

    async function loadPublicLeaderboard() {
      const body = document.getElementById('leaderboardBody');
      if (!body) return;
      body.innerHTML = '<p class="mg-modal-muted">Loading…</p>';
      try {
        const sessionKey = computePlaySessionKey();
        const snap = await window.dbGet(window.dbRef(window.db, `publicAnswers/${GAME_ID}`));
        const rows = [];
        if (snapExists(snap) && snap.val()) {
          const val = snap.val();
          Object.keys(val).forEach(id => {
            const s = val[id];
            if (s && typeof s === 'object' && scoreMatchesSessionKey(s, sessionKey)) rows.push(s);
          });
        }
        rows.sort((a, b) => {
          const dp = leaderboardPoints(b) - leaderboardPoints(a);
          if (dp !== 0) return dp;
          const te = leaderboardElapsedMs(a) - leaderboardElapsedMs(b);
          if (te !== 0) return te;
          return (b.timestamp || 0) - (a.timestamp || 0);
        });
        if (!rows.length) {
          const roundId = getPlayRoundId();
          const label = roundId && archiveCatalog.length
            ? (archiveCatalog.find(e => e.id === roundId)?.label || 'this game')
            : 'this game';
          body.innerHTML = `<p class="mg-modal-muted">No scores for ${esc(label)} yet. Be the first!</p>`;
          return;
        }
        body.innerHTML = `<ul class="lb-list">${rows.slice(0, 100).map(s => `
          <li class="lb-row">
            <span class="lb-name">${esc(s.displayName || 'Anonymous')}</span>
            <span class="lb-points-time">
              <span class="lb-score">${leaderboardPoints(s)}</span>
              <span class="lb-time">${leaderboardTimeLabel(s)}</span>
            </span>
          </li>`).join('')}</ul>`;
      } catch (e) {
        console.error('InVennTions leaderboard:', e);
        body.innerHTML = '<p class="mg-modal-muted">Could not load leaderboard.</p>';
      }
    }

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function escAttr(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;')
        .replace(/</g, '&lt;');
    }

    let boardDelegationBound = false;

    function ensureBoardDelegation() {
      if (boardDelegationBound) return;
      boardDelegationBound = true;
      puzzleMount.addEventListener('click', onBoardClick);
    }

    function onBoardClick(e) {
      let n = e.target;
      if (n && n.nodeType === Node.TEXT_NODE) n = n.parentElement;
      if (!(n instanceof HTMLElement)) return;
      const t = n;
      const stripEl = t.closest('.mg-answer-strip[id]');
      if (stripEl && stripEl.id.startsWith('strip-p-')) {
        const i = Number(stripEl.id.replace('strip-p-', ''));
        if (!Number.isNaN(i) && puzzles[i] && !puzzleSolved[i]) {
          resetRevealConfirm();
          focusKind = 'phrase';
          focusPuzzleIndex = i;
          updateFocusHighlight();
        }
        return;
      }
      if (stripEl && stripEl.id === 'strip-c') {
        if (commonality && !commonalitySolved) {
          resetRevealConfirm();
          focusKind = 'commonality';
          updateFocusHighlight();
        }
        return;
      }
      if (phase === 'finish') return;

      const clueWords = t.closest('.mg-words[data-clue-side]');
      if (clueWords) {
        const side = clueWords.getAttribute('data-clue-side');
        const i = Number(clueWords.getAttribute('data-phrase-i'));
        if (Number.isNaN(i) || !puzzles[i] || (side !== 'L' && side !== 'R')) return;
        const p = puzzles[i];
        if (puzzleSolved[i]) return;
        const isLeft = side === 'L';
        const key = `${side}-${i}`;
        const hasHints = isLeft ? p.leftHints.length > 0 : p.rightHints.length > 0;
        const revealed = isLeft ? revealedLeftArr[i] : revealedRightArr[i];
        const maxH = isLeft ? p.leftHints.length : p.rightHints.length;
        if (!hasHints || revealed >= maxH) return;
        if (hintPending.has(key)) {
          clearHintTimer(key);
          hintPending.delete(key);
          if (isLeft) {
            revealedLeftArr[i]++;
          } else {
            revealedRightArr[i]++;
          }
          registerHintUsed();
          renderPuzzleHintRow(i, p);
        } else {
          hintPending.add(key);
          syncPhraseHintTapUi(i);
          scheduleHintPendingRevert(key);
        }
        scheduleClueHintTextFit(false, null, clueWords.closest('.mg-phrase-block'));
        updateKeyboardActions();
        return;
      }

      const comBlock = t.closest('#comPromptBlock');
      if (comBlock && commonality && !commonalitySolved) {
        const c = commonality;
        if (c.hints.length === 0 || revealedComHints >= c.hints.length) return;
        if (hintPending.has('C')) {
          clearHintTimer('C');
          hintPending.delete('C');
          revealedComHints++;
          registerHintUsed();
          renderComHintZone();
        } else {
          hintPending.add('C');
          syncComHintTapUi();
          scheduleHintPendingRevert('C');
        }
        scheduleClueHintTextFit();
        updateKeyboardActions();
      }
    }

    function renderPuzzleHintRow(i, p) {
      if (!p) return;
      const leftZone = document.getElementById(`hintLeftZone-${i}`);
      const rightZone = document.getElementById(`hintRightZone-${i}`);
      const rl = revealedLeftArr[i];
      const rr = revealedRightArr[i];
      if (rl >= p.leftHints.length || p.leftHints.length === 0) {
        hintPending.delete(`L-${i}`);
        clearHintTimer(`L-${i}`);
      }
      if (rr >= p.rightHints.length || p.rightHints.length === 0) {
        hintPending.delete(`R-${i}`);
        clearHintTimer(`R-${i}`);
      }
      fillHintArea(leftZone, rl, p.leftHints);
      fillHintArea(rightZone, rr, p.rightHints);
      syncPhraseHintTapUi(i);
    }

    function renderComHintZone() {
      const comZone = document.getElementById('comHintZone');
      if (!comZone || !commonality) return;
      const c = commonality;
      if (commonalitySolved || revealedComHints >= c.hints.length || c.hints.length === 0) {
        hintPending.delete('C');
        clearHintTimer('C');
      }
      fillHintArea(comZone, revealedComHints, c.hints);
      syncComHintTapUi();
    }

    function renderBoard() {
      boardArea.classList.remove('hidden');
      puzzleMount.classList.remove('hidden');

      let html = '';
      for (let i = 0; i < puzzles.length; i++) {
        const p = puzzles[i];
        if (!p) continue;
        const solved = puzzleSolved[i];
        let stripClasses;
        let stripDisplay;
        if (solved) {
          stripClasses = 'mg-answer-strip solved';
          stripDisplay = esc(puzzleBuffers[i] ? puzzleBuffers[i].toUpperCase() : p.answer);
        } else {
          const t = bufNorm(puzzleBuffers[i]);
          puzzleBuffers[i] = t;
          const empty = !t.trim();
          stripClasses = empty ? 'mg-answer-strip empty' : 'mg-answer-strip';
          stripDisplay = empty ? '\u00A0' : esc(t.toUpperCase());
        }
        html += `
      <div class="mg-phrase-block" data-phrase-i="${i}">
        <div class="mg-main-row-wrap">
          <svg class="mg-phrase-sq-svg" aria-hidden="true">
            <path class="mg-phrase-sq-path mg-phrase-sq-a" />
            <path class="mg-phrase-sq-path mg-phrase-sq-b" />
            <path class="mg-phrase-sq-path mg-phrase-sq-c" />
          </svg>
          <div class="mg-main-row">
          <div class="mg-side mg-side-left">
            <div class="mg-words" id="clueWordsL-${i}" data-clue-side="L" data-phrase-i="${i}">
              <div class="mg-words-text">${esc(p.leftWords)}</div>
              <div class="mg-hint-tap-msg" aria-live="polite"></div>
              <div class="mg-hint-area" id="hintLeftZone-${i}"></div>
            </div>
          </div>
          <div class="mg-center">
            <div class="${stripClasses}" id="strip-p-${i}">${stripDisplay}</div>
          </div>
          <div class="mg-side mg-side-right">
            <div class="mg-words" id="clueWordsR-${i}" data-clue-side="R" data-phrase-i="${i}">
              <div class="mg-words-text">${esc(p.rightWords)}</div>
              <div class="mg-hint-tap-msg" aria-live="polite"></div>
              <div class="mg-hint-area" id="hintRightZone-${i}"></div>
            </div>
          </div>
          </div>
        </div>
      </div>`;
      }

      if (commonality) {
        const cs = commonalitySolved;
        let comStripClass;
        let comDisplay;
        if (cs) {
          comStripClass = 'mg-answer-strip solved';
          comDisplay = esc(commonalityBuffer ? commonalityBuffer.toUpperCase() : commonality.answer);
        } else {
          const t = bufNorm(commonalityBuffer);
          commonalityBuffer = t;
          const empty = !t.trim();
          comStripClass = empty ? 'mg-answer-strip empty' : 'mg-answer-strip';
          comDisplay = empty ? '\u00A0' : esc(t.toUpperCase());
        }
        html += `
      <div class="com-section">
        <div class="com-prompt" id="comPromptBlock">
          <div>${esc(commonality.prompt)}</div>
          <div class="mg-hint-tap-msg" id="comHintTapMsg" aria-live="polite"></div>
          <div class="com-hint-inline" id="comHintZone"></div>
        </div>
        <div class="mg-main-row mg-com-answer-row" style="justify-content:center">
          <div class="mg-center mg-com-center">
            <div class="${comStripClass} mg-com-strip" id="strip-c">${comDisplay}</div>
          </div>
        </div>
      </div>`;
      }

      puzzleMount.innerHTML = html;

      for (let i = 0; i < puzzles.length; i++) {
        renderPuzzleHintRow(i, puzzles[i]);
      }
      if (commonality) renderComHintZone();

      if (phase === 'finish') {
        keyboardWrap.classList.add('hidden-kb');
      } else {
        updateHeaderTitles();
        pageSubtitle.textContent = activeRoundSubtitle.trim() || DEFAULT_PLAY_SUBTITLE;
        keyboardWrap.classList.remove('hidden-kb');
      }
      updateFocusHighlight();
      preprocessClueBoxLayout();
      scheduleClueHintTextFit(true, () => {
        fitBoardToViewport();
        updateKeyboardActions();
      });
    }

    function updateFocusHighlight() {
      const prevFocused = document.querySelectorAll('.mg-answer-strip.focused');
      for (let fi = 0; fi < prevFocused.length; fi++) prevFocused[fi].classList.remove('focused');
      if (phase === 'finish') {
        updateKeyboardActions();
        return;
      }
      if (focusKind === 'phrase') {
        const el = document.getElementById(`strip-p-${focusPuzzleIndex}`);
        if (el && !puzzleSolved[focusPuzzleIndex]) el.classList.add('focused');
      } else if (focusKind === 'commonality' && commonality && !commonalitySolved) {
        const comStrip = document.getElementById('strip-c');
        if (comStrip) comStrip.classList.add('focused');
      }
      updateKeyboardActions();
    }

    function cycleFocus(delta) {
      const slots = [];
      for (let i = 0; i < puzzles.length; i++) {
        if (!puzzleSolved[i]) slots.push({ kind: 'phrase', i });
      }
      if (commonality && !commonalitySolved) slots.push({ kind: 'commonality', i: -1 });
      if (!slots.length) return;
      let cur = slots.findIndex(s =>
        (s.kind === 'commonality' && focusKind === 'commonality') ||
        (s.kind === 'phrase' && focusKind === 'phrase' && s.i === focusPuzzleIndex)
      );
      if (cur < 0) cur = 0;
      const next = (cur + delta + slots.length * 10) % slots.length;
      const s = slots[next];
      resetRevealConfirm();
      focusKind = s.kind;
      if (s.kind === 'phrase') focusPuzzleIndex = s.i;
      updateFocusHighlight();
    }

    function focusNextSlot() {
      resetRevealConfirm();
      for (let j = focusPuzzleIndex + 1; j < puzzles.length; j++) {
        if (!puzzleSolved[j]) {
          focusPuzzleIndex = j;
          focusKind = 'phrase';
          return;
        }
      }
      for (let j = 0; j < focusPuzzleIndex; j++) {
        if (!puzzleSolved[j]) {
          focusPuzzleIndex = j;
          focusKind = 'phrase';
          return;
        }
      }
      if (commonality && !commonalitySolved) focusKind = 'commonality';
    }

    function checkAllComplete() {
      const phrasesDone = puzzleSolved.length > 0 && puzzleSolved.every(Boolean);
      const comOk = !commonality || commonalitySolved;
      if (phrasesDone && comOk) {
        const t = puzzles.length + (commonality ? 1 : 0);
        finishTotalCorrect = t;
        finishTotalPossible = t;
        phase = 'finish';
        renderBoard();
        showFinish();
        savePlayProgress();
        return true;
      }
      return false;
    }

    function shakeStrip(id) {
      const strip = document.getElementById(id);
      if (strip) {
        strip.classList.add('nope');
        setTimeout(() => strip.classList.remove('nope'), 400);
      }
    }

    let kbGuessBtn = null;
    let kbRevealBtn = null;
    let revealConfirmPending = false;
    let revealConfirmTimer = 0;
    const REVEAL_CONFIRM_MS = 1500;

    function resetRevealConfirm() {
      clearTimeout(revealConfirmTimer);
      revealConfirmTimer = 0;
      revealConfirmPending = false;
      if (!kbRevealBtn) return;
      kbRevealBtn.textContent = 'REVEAL';
      kbRevealBtn.classList.remove('reveal-confirm');
    }

    function canRevealAnswerForFocus() {
      if (phase === 'finish') return false;
      if (focusKind === 'phrase') {
        const i = focusPuzzleIndex;
        return !!(puzzles[i] && !puzzleSolved[i]);
      }
      if (focusKind === 'commonality' && commonality) {
        return !commonalitySolved;
      }
      return false;
    }

    function updateKeyboardActions() {
      if (!kbGuessBtn || !kbRevealBtn) return;
      const playing = phase !== 'finish';
      kbGuessBtn.disabled = !playing;
      const canReveal = playing && canRevealAnswerForFocus();
      kbRevealBtn.disabled = !canReveal;
      if (!canReveal) resetRevealConfirm();
    }

    function revealFocusedAnswer() {
      if (phase === 'finish') return;
      if (!canRevealAnswerForFocus()) {
        resetRevealConfirm();
        toastEl.textContent = 'Nothing to reveal here.';
        setTimeout(() => { toastEl.textContent = ''; }, 1600);
        return;
      }
      resetRevealConfirm();
      if (focusKind === 'phrase') {
        const i = focusPuzzleIndex;
        const p = puzzles[i];
        puzzleSolved[i] = true;
        puzzleBuffers[i] = normGuess(p.answer);
        answerRevealCount++;
        addScore(-2);
        applyFreeHintsOnPhraseSolve(i, p);
        renderBoard();
        renderPuzzleHintRow(i, p);
        scheduleClueHintTextFit(false, null, document.querySelector(`.mg-phrase-block[data-phrase-i="${i}"]`));
        fitBoardToViewport();
        if (checkAllComplete()) return;
        focusNextSlot();
        updateFocusHighlight();
        return;
      }
      if (focusKind === 'commonality' && commonality && !commonalitySolved) {
        commonalitySolved = true;
        commonalityBuffer = normGuess(commonality.answer);
        answerRevealCount++;
        addScore(-2);
        hintPending.delete('C');
        clearHintTimer('C');
        renderBoard();
        if (checkAllComplete()) return;
        updateFocusHighlight();
      }
    }

    function onReveal() {
      if (phase === 'finish' || !canRevealAnswerForFocus()) {
        resetRevealConfirm();
        if (phase !== 'finish') {
          toastEl.textContent = 'Nothing to reveal here.';
          setTimeout(() => { toastEl.textContent = ''; }, 1600);
        }
        return;
      }
      if (!revealConfirmPending) {
        revealConfirmPending = true;
        kbRevealBtn.textContent = 'Are you sure?';
        kbRevealBtn.classList.add('reveal-confirm');
        clearTimeout(revealConfirmTimer);
        revealConfirmTimer = window.setTimeout(resetRevealConfirm, REVEAL_CONFIRM_MS);
        return;
      }
      revealFocusedAnswer();
    }

    function buildKeyboard() {
      kbInputQueue.length = 0;
      kbInputPumpScheduled = false;
      kbActivePointers.forEach((_, pointerId) => clearKbPointer(pointerId));
      keyboardRoot.innerHTML = '';
      kbGuessBtn = null;
      kbRevealBtn = null;
      resetRevealConfirm();
      ensureKeyboardPointerHandling();

      const actionRow = document.createElement('div');
      actionRow.className = 'kb-row kb-action-row';
      kbGuessBtn = document.createElement('button');
      kbGuessBtn.type = 'button';
      kbGuessBtn.className = 'kb-key guess action';
      kbGuessBtn.textContent = 'GUESS';
      bindKbKeyAccessibility(kbGuessBtn);
      kbRevealBtn = document.createElement('button');
      kbRevealBtn.type = 'button';
      kbRevealBtn.className = 'kb-key reveal action';
      kbRevealBtn.textContent = 'REVEAL';
      bindKbKeyAccessibility(kbRevealBtn);
      actionRow.appendChild(kbGuessBtn);
      actionRow.appendChild(kbRevealBtn);
      keyboardRoot.appendChild(actionRow);

      function row(keys, extra) {
        const d = document.createElement('div');
        d.className = 'kb-row';
        keys.forEach(k => {
          const b = document.createElement('button');
          b.type = 'button';
          b.className = 'kb-key';
          b.textContent = k;
          b.dataset.ch = k;
          bindKbKeyAccessibility(b);
          d.appendChild(b);
        });
        if (extra) {
          bindKbKeyAccessibility(extra);
          d.appendChild(extra);
        }
        keyboardRoot.appendChild(d);
      }

      row(KB_TOP);
      row(KB_MID);
      const sp = document.createElement('button');
      sp.type = 'button';
      sp.className = 'kb-key space';
      sp.textContent = 'SPACE';
      bindKbKeyAccessibility(sp);
      const backBtn = document.createElement('button');
      backBtn.type = 'button';
      backBtn.className = 'kb-key back wide';
      backBtn.textContent = '⌫';
      bindKbKeyAccessibility(backBtn);
      const bottomRow = document.createElement('div');
      bottomRow.className = 'kb-row kb-row-bottom';
      KB_BOT.forEach(k => {
        const b = document.createElement('button');
        b.type = 'button';
        b.className = 'kb-key';
        b.textContent = k;
        b.dataset.ch = k;
        bindKbKeyAccessibility(b);
        bottomRow.appendChild(b);
      });
      bottomRow.appendChild(sp);
      bottomRow.appendChild(backBtn);
      keyboardRoot.appendChild(bottomRow);

      updateKeyboardActions();
    }

    function syncFocusedStripDisplay() {
      if (focusKind === 'phrase') {
        const i = focusPuzzleIndex;
        const el = document.getElementById(`strip-p-${i}`);
        if (!el || puzzleSolved[i]) return;
        puzzleBuffers[i] = bufNorm(puzzleBuffers[i]);
        const disp = displayFromBuffer(puzzleBuffers[i]);
        el.textContent = disp;
        if (disp === '\u00A0' || !bufNorm(puzzleBuffers[i]).trim()) {
          el.classList.add('empty');
          el.classList.remove('solved');
        } else {
          el.classList.remove('empty');
        }
        fitAnswerStripFont(el);
      } else if (focusKind === 'commonality' && commonality) {
        const el = document.getElementById('strip-c');
        if (!el || commonalitySolved) return;
        commonalityBuffer = bufNorm(commonalityBuffer);
        const disp = displayFromBuffer(commonalityBuffer);
        el.textContent = disp;
        if (disp === '\u00A0' || !bufNorm(commonalityBuffer).trim()) {
          el.classList.add('empty');
        } else {
          el.classList.remove('empty');
        }
        fitAnswerStripFont(el);
      }
    }

    function onKeyTap(ch) {
      resetRevealConfirm();
      if (phase === 'finish') return;
      if (focusKind === 'phrase') {
        const i = focusPuzzleIndex;
        if (puzzleSolved[i]) return;
        if (ch === 'BACK') puzzleBuffers[i] = bufNorm(puzzleBuffers[i].slice(0, -1));
        else puzzleBuffers[i] = bufNorm(puzzleBuffers[i] + ch);
      } else if (focusKind === 'commonality' && commonality && !commonalitySolved) {
        if (ch === 'BACK') commonalityBuffer = bufNorm(commonalityBuffer.slice(0, -1));
        else commonalityBuffer = bufNorm(commonalityBuffer + ch);
      } else return;
      syncFocusedStripDisplay();
      updateFocusHighlight();
      savePlayProgress();
    }

    function onGuess() {
      resetRevealConfirm();
      if (phase === 'finish') return;
      let guess = '';

      if (focusKind === 'phrase') {
        const i = focusPuzzleIndex;
        if (puzzleSolved[i]) return;
        guess = normSubmit(puzzleBuffers[i]);
      } else if (focusKind === 'commonality' && commonality && !commonalitySolved) {
        guess = normSubmit(commonalityBuffer);
      } else return;

      if (!guess) {
        toastEl.textContent = 'Type something before GUESS.';
        setTimeout(() => { toastEl.textContent = ''; }, 1600);
        return;
      }

      if (focusKind === 'phrase') {
        const i = focusPuzzleIndex;
        const p = puzzles[i];
        if (!p.accept.has(guess)) {
          incorrectGuesses++;
          shakeStrip(`strip-p-${i}`);
          return;
        }
        addScore(1);
        sessionCorrectPhraseGuesses++;
        puzzleSolved[i] = true;
        puzzleBuffers[i] = normGuess(guess);
        applyFreeHintsOnPhraseSolve(i, p);
        renderBoard();
        playPhraseSolveSquircle(i, () => {
          renderPuzzleHintRow(i, p);
          scheduleClueHintTextFit();
          if (checkAllComplete()) return;
          focusNextSlot();
          updateFocusHighlight();
        });
        return;
      }

      if (focusKind !== 'commonality' || !commonality) return;

      if (!commonality.accept.has(guess)) {
        incorrectGuesses++;
        shakeStrip('strip-c');
        return;
      }
      const connectionBonus = countUnansweredPhrases();
      addScore(2 + connectionBonus);
      sessionThemeGuessCount++;
      sessionThemeBonusPoints += connectionBonus;
      sessionThemeBonusEvents.push({ remaining: connectionBonus, points: connectionBonus });
      commonalitySolved = true;
      commonalityBuffer = normGuess(guess);
      hintPending.delete('C');
      clearHintTimer('C');
      if (checkAllComplete()) return;
      renderBoard();
    }

    function showFinalScoreFlash(onDone) {
      let overlay = document.getElementById('invFinalScoreFlash');
      if (!overlay) {
        overlay = document.createElement('div');
        overlay.id = 'invFinalScoreFlash';
        overlay.className = 'inv-final-score-flash hidden';
        overlay.setAttribute('aria-hidden', 'true');
        document.body.appendChild(overlay);
      }
      overlay.innerHTML = `
        <div class="inv-final-score-inner">
          <div class="inv-final-score-label">Final score</div>
          <div class="inv-final-score-value">${esc(String(getDisplayScore()))}</div>
          <div class="inv-final-score-time">${esc(formatElapsedMs(getPlayElapsedMs()))}</div>
        </div>`;
      overlay.classList.remove('hidden');
      overlay.setAttribute('aria-hidden', 'false');
      window.setTimeout(() => {
        overlay.classList.add('hidden');
        overlay.setAttribute('aria-hidden', 'true');
        if (onDone) onDone();
      }, FINAL_SCORE_FLASH_MS);
    }

    function scheduleFinishModalReveal(resuming) {
      if (resuming) {
        window.setTimeout(revealScoreModal, 50);
        return;
      }
      showFinalScoreFlash(() => revealScoreModal());
    }

    function showFinish(resuming) {
      hideArchiveScreen();
      hideTitleScreen();
      document.body.classList.remove('inv-title-active');
      quizCard.classList.remove('hidden');
      keyboardWrap.classList.add('hidden-kb');
      pageSubtitle.textContent = 'All done!';
      stopPlayTimer();
      if (!resuming) {
        scoreSavedThisSession = false;
        lastSavedDisplayName = '';
      }

      const total = finishTotalPossible;
      const correct = finishTotalCorrect;
      const phraseCountAll = totalPhraseCountAcrossRounds();
      const elapsedLabel = formatElapsedMs(getPlayElapsedMs());
      const alreadySubmitted = hasSubmittedForCurrentSession() && !window.invIsAdmin;
      const prior = readSubmitRecord();

      const scoreBody = document.getElementById('scoreModalBody');

      if (alreadySubmitted) {
        scoreBody.innerHTML = `
        <div class="summary">
          You already saved a score for this puzzle set.<br>
          Saved score: <strong>${prior?.points ?? getDisplayScore()}</strong> · Time: <strong>${prior?.elapsedMs != null ? formatElapsedMs(prior.elapsedMs) : elapsedLabel}</strong>
        </div>
        <div class="btn-row">
          <button type="button" class="primary" id="viewLeaderboardBtn">View leaderboard</button>
          <button type="button" class="secondary" id="btnBrowseArchive">Browse archive</button>
        </div>`;
        document.getElementById('viewLeaderboardBtn')?.addEventListener('click', async () => {
          await showFinishLeaderboard(prior?.displayName || 'Anonymous');
        });
        bindBrowseArchiveButton();
        scheduleFinishModalReveal(resuming);
        return;
      }

      scoreBody.innerHTML = `
        ${buildScoreBreakdownHtml(elapsedLabel)}
        <label class="lbl" for="displayName">Name for the leaderboard (optional)</label>
        <input type="text" id="displayName" maxlength="40" placeholder="Anonymous" autocomplete="nickname" value="${escAttr(getPreferredDisplayName())}" />
        <div class="btn-row">
          <button type="button" class="primary" id="saveScoreBtn">Save score</button>
          <button type="button" class="secondary" id="btnBrowseArchive">Browse archive</button>
        </div>`;

      document.getElementById('saveScoreBtn').addEventListener('click', () => submitFinalScore(total, correct, phraseCountAll));
      bindBrowseArchiveButton();

      scheduleFinishModalReveal(resuming);
    }

    function revealScoreModal() {
      hideArchiveScreen();
      hideTitleScreen();
      document.body.classList.remove('inv-title-active');
      openScoreModal();
      const btnScore = document.getElementById('btnScoreModal');
      if (btnScore) btnScore.classList.remove('hidden');
    }

    async function submitFinalScore(total, correct, phraseCountAll) {
      if (hasSubmittedForCurrentSession() && !window.invIsAdmin) {
        toastEl.textContent = 'You already submitted for this puzzle set.';
        setTimeout(() => { toastEl.textContent = ''; }, 2200);
        return;
      }
      const raw = document.getElementById('displayName').value.trim();
      const displayName = raw || 'Anonymous';
      const elapsedMs = getPlayElapsedMs();

      const payload = {
        displayName,
        gameId: activeGameId,
        gameTitle: activeGameTitle,
        formatVersion: 5,
        roundId: getPlayRoundId(),
        points: getDisplayScore(),
        elapsedMs,
        elapsedSeconds: Math.floor(elapsedMs / 1000),
        sessionKey: computePlaySessionKey(),
        roundIds: playSessionRoundKey ? playSessionRoundKey.split(',').filter(Boolean) : [],
        totalRounds: total,
        incorrectGuesses,
        hintsUsed: totalHintsUsed(),
        answerReveals: answerRevealCount,
        commonalitySolved: correct === total,
        phraseCount: phraseCountAll,
        roundCount: gameRounds.length,
        timestamp: Date.now(),
        date: new Date().toISOString().split('T')[0]
      };

      try {
        const answersRef = window.dbRef(window.db, `games/${GAME_ID}/answers`);
        const newRef = window.dbPush(answersRef);
        await window.dbSet(newRef, payload);
        try {
          await window.dbSet(window.dbRef(window.db, `publicAnswers/${GAME_ID}/${newRef.key}`), payload);
        } catch (mirrorErr) {
          console.warn('InVennTions public mirror:', mirrorErr);
        }
        const rank = await computeLeaderboardRank(computePlaySessionKey(), payload.points, payload.elapsedMs);
        toastEl.textContent = 'Score saved. Thanks for playing!';
        const sb = document.getElementById('saveScoreBtn');
        if (sb) sb.disabled = true;
        scoreSavedThisSession = true;
        lastSavedDisplayName = displayName;
        markSessionSubmitted(displayName, rank);
        await showFinishLeaderboard(displayName);
      } catch (e) {
        console.error(e);
        try {
          const pubRef = window.dbRef(window.db, `publicAnswers/${GAME_ID}`);
          const newRef = window.dbPush(pubRef);
          await window.dbSet(newRef, payload);
          const rank = await computeLeaderboardRank(computePlaySessionKey(), payload.points, payload.elapsedMs);
          toastEl.textContent = 'Score saved. Thanks for playing!';
          const sb = document.getElementById('saveScoreBtn');
          if (sb) sb.disabled = true;
          scoreSavedThisSession = true;
          lastSavedDisplayName = displayName;
          markSessionSubmitted(displayName, rank);
          await showFinishLeaderboard(displayName);
        } catch (e2) {
          console.error(e2);
          toastEl.textContent = 'Could not save score.';
        }
      }
    }

    function isTypingInFormField(target) {
      return target instanceof HTMLInputElement || target instanceof HTMLTextAreaElement || target instanceof HTMLSelectElement;
    }

    function onPhysicalKeydown(e) {
      const archiveScreenEl = document.getElementById('archiveScreen');
      if (archiveScreenEl && !archiveScreenEl.classList.contains('hidden')) {
        if (e.key === 'Escape') {
          e.preventDefault();
          hideArchiveScreen();
          showTitleScreen();
        }
        return;
      }
      const titleScreen = document.getElementById('titleScreen');
      if (titleScreen && !titleScreen.classList.contains('hidden')) {
        if (e.key === 'Escape') {
          const infoEl = document.getElementById('infoModal');
          if (infoEl && !infoEl.classList.contains('hidden')) {
            e.preventDefault();
            infoEl.classList.add('hidden');
          }
        }
        return;
      }
      if (e.key === 'Escape') {
        const ids = ['helpModal', 'aboutModal', 'infoModal', 'scoreModal'];
        for (let i = ids.length - 1; i >= 0; i--) {
          const el = document.getElementById(ids[i]);
          if (el && !el.classList.contains('hidden')) {
            e.preventDefault();
            el.classList.add('hidden');
            return;
          }
        }
      }
      if (phase === 'finish') return;
      if (isTypingInFormField(e.target)) return;
      if (typeof e.key !== 'string') return;

      if (e.key === 'Enter') {
        e.preventDefault();
        if (kbGuessBtn) flashKeyBtn(kbGuessBtn);
        onGuess();
        return;
      }
      if (e.key === 'Tab') {
        e.preventDefault();
        cycleFocus(e.shiftKey ? -1 : 1);
        return;
      }
      if (e.key === 'Backspace') {
        e.preventDefault();
        flashKeyForInput('BACK');
        onKeyTap('BACK');
        return;
      }
      if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
        const ch = e.key;
        if (/^[a-zA-Z]$/.test(ch)) {
          e.preventDefault();
          flashKeyForInput(ch.toUpperCase());
          onKeyTap(ch.toUpperCase());
          return;
        }
        if (ch === ' ') {
          e.preventDefault();
          flashKeyForInput(' ');
          onKeyTap(' ');
          return;
        }
        if (ch === "'" || ch === '-') {
          e.preventDefault();
          onKeyTap(ch);
        }
      }
    }

    window.addEventListener('keydown', onPhysicalKeydown);

    function resetPlaySession() {
      stopProgressAutosave();
      closeAllModals();
      const btnScoreEl = document.getElementById('btnScoreModal');
      if (btnScoreEl) btnScoreEl.classList.add('hidden');

      phase = 'play';
      roundIndex = 0;
      finishTotalCorrect = 0;
      finishTotalPossible = 0;
      incorrectGuesses = 0;
      revealedComHints = 0;
      hintsButtonTaps = 0;
      answerRevealCount = 0;
      sessionCorrectPhraseGuesses = 0;
      sessionThemeGuessCount = 0;
      sessionThemeBonusPoints = 0;
      sessionThemeBonusEvents = [];
      scoreSavedThisSession = false;
      lastSavedDisplayName = '';
      scorePoints = 0;
      hintPending.clear();
      clearAllHintTimers();
      commonalitySolved = false;
      commonalityBuffer = '';
      focusKind = 'phrase';
      focusPuzzleIndex = 0;
      resetRevealConfirm();
      resetPlayTimer();
      updateScoreStat();
      if (toastEl) toastEl.textContent = '';
    }

    function archiveBlockToPlayRound(block) {
      if (!block || block.hidden) return null;
      const puzz = normalizePuzzles(block.puzzles);
      if (!puzz.length) return null;
      return {
        roundTitle: '',
        subtitle: block.subtitle != null ? String(block.subtitle) : '',
        puzzles: puzz,
        commonality: normalizeCommonality(block.commonality)
      };
    }

    async function loadSiteSettings() {
      const siteSnap = await window.dbGet(window.dbRef(window.db, `games/${GAME_ID}/settings/site`));
      const site = snapExists(siteSnap) && siteSnap.val() ? siteSnap.val() : {};
      activeGameTitle = site.gameTitle != null ? String(site.gameTitle).trim() : '';
      if (!activeGameTitle) activeGameTitle = 'InVennTions';
      playerHelpHtml = site.playerHelpHtml != null ? String(site.playerHelpHtml) : '';
      aboutEvilTriviaHtml = site.aboutEvilTriviaHtml != null ? String(site.aboutEvilTriviaHtml) : '';
      infoHtml = site.infoHtml != null ? String(site.infoHtml) : '';
      document.title = `${activeGameTitle} — Evil Trivia`;
    }

    async function loadLiveRoundsFromArchive(archiveRawOpt) {
      const liveSnap = await window.dbGet(window.dbRef(window.db, `games/${GAME_ID}/settings/live`));
      let roundIds = [];
      if (snapExists(liveSnap) && liveSnap.val() && Array.isArray(liveSnap.val().roundIds)) {
        roundIds = liveSnap.val().roundIds.map(String);
      }
      const archiveRaw = archiveRawOpt || await fetchArchiveRaw();
      roundIds = resolveEffectiveLiveRoundIds(archiveRaw, roundIds);
      if (roundIds.length) {
        const rid = roundIds[0];
        const snap = await window.dbGet(window.dbRef(window.db, `games/${GAME_ID}/archive/${rid}`));
        if (!snapExists(snap)) return false;
        const block = snap.val();
        const row = archiveBlockToPlayRound(block);
        if (!row) return false;
        activeGameId = 'live';
        playSessionRoundKey = rid;
        gameRounds = [row];
        let playDate = block && block.playDate != null ? String(block.playDate).trim() : '';
        if (!playDate && block && block.updatedAt) {
          playDate = new Date(block.updatedAt).toISOString().split('T')[0];
        }
        if (!playDate) playDate = todayISO();
        liveRoundMeta = {
          id: rid,
          label: roundLabelFromBlock(block, rid) || 'Round',
          playDate
        };
        activeRoundMeta = { ...liveRoundMeta };
        return true;
      }
      liveRoundMeta = null;
      return false;
    }

    async function loadLegacyLibraryGame() {
      const settingsSnap = await window.dbGet(window.dbRef(window.db, `games/${GAME_ID}/settings/activeGameId`));
      const gameId = snapExists(settingsSnap) && settingsSnap.val() ? String(settingsSnap.val()).trim() : '';
      if (!gameId) return false;

      const gameSnap = await window.dbGet(window.dbRef(window.db, `games/${GAME_ID}/library/${gameId}`));
      if (!snapExists(gameSnap)) return false;

      const data = gameSnap.val();
      activeGameId = gameId;
      playSessionRoundKey = gameId;
      if (!playerHelpHtml && data.playerHelpHtml) playerHelpHtml = String(data.playerHelpHtml);
      if (!infoHtml && data.infoHtml) infoHtml = String(data.infoHtml);
      if (!aboutEvilTriviaHtml && data.aboutEvilTriviaHtml) aboutEvilTriviaHtml = String(data.aboutEvilTriviaHtml);
      const gt = data && data.gameTitle != null ? String(data.gameTitle).trim() : '';
      if (gt) activeGameTitle = gt;

      gameRounds = normalizeGameRounds(data);
      return gameRounds.length > 0;
    }

    async function fetchQuizDataForRoundIds(roundIds) {
      resetPlaySession();

      if (!boardArea || !puzzleMount || !keyboardWrap || !keyboardRoot) {
        throw new Error('Quiz page layout is incomplete. Try a hard refresh (Shift+Reload).');
      }

      await loadSiteSettings();
      gameRounds = [];

      for (let i = 0; i < roundIds.length; i++) {
        const rid = String(roundIds[i]);
        const snap = await window.dbGet(window.dbRef(window.db, `games/${GAME_ID}/archive/${rid}`));
        if (!snapExists(snap)) continue;
        const block = snap.val();
        const row = archiveBlockToPlayRound(block);
        if (row) {
          gameRounds.push(row);
          if (i === 0) {
            let playDate = block && block.playDate != null ? String(block.playDate).trim() : '';
            if (!playDate && block && block.updatedAt) {
              playDate = new Date(block.updatedAt).toISOString().split('T')[0];
            }
            if (!playDate) playDate = todayISO();
            activeRoundMeta = {
              id: rid,
              label: roundLabelFromBlock(block, rid) || 'Round',
              playDate
            };
          }
        }
      }

      if (!gameRounds.length) {
        throw new Error('That round could not be loaded.');
      }
      activeGameId = 'archive';
      playSessionRoundKey = roundIds.map(String).join(',');
      collapseToSingleRoundSession();
    }

    async function loadQuizDataOnly(archiveRawOpt) {
      await loadSiteSettings();
      gameRounds = [];

      const loadedLive = await loadLiveRoundsFromArchive(archiveRawOpt);
      if (!loadedLive) {
        const loadedLegacy = await loadLegacyLibraryGame();
        if (!loadedLegacy) {
          throw new Error('No quiz is live yet. Mark rounds as Live in admin.');
        }
        if (gameRounds.length === 0) {
          const gameSnap = await window.dbGet(window.dbRef(window.db, `games/${GAME_ID}/library/${activeGameId}`));
          const data = snapExists(gameSnap) ? gameSnap.val() : null;
          if (data && data.questions && coerceArr(data.questions).length) {
            throw new Error('This quiz still uses the old multiple-choice format. Open admin and convert it.');
          }
          throw new Error('This quiz has no phrases yet.');
        }
      }

      if (!gameRounds.length) {
        throw new Error('No playable rounds. Add phrases in admin and mark rounds Live.');
      }
      collapseToSingleRoundSession();
    }

    async function fetchQuizData() {
      resetPlaySession();

      if (!boardArea || !puzzleMount || !keyboardWrap || !keyboardRoot) {
        throw new Error('Quiz page layout is incomplete. Try a hard refresh (Shift+Reload).');
      }

      await loadQuizDataOnly();
    }

    function startQuizUi(resuming) {
      errorState.classList.add('hidden');
      loadingState.classList.add('hidden');
      boardArea.classList.remove('hidden');
      if (!resuming) {
        initRoundState(0);
      }
      ensureBoardDelegation();
      buildKeyboard();
      statBar.classList.remove('hidden');
      renderBoard();
      showQuizShell();
      if (!resuming) {
        startPlayTimer();
      }
      ensureProgressAutosave();
      if (phase === 'finish') {
        pageSubtitle.textContent = 'All done!';
        keyboardWrap.classList.add('hidden-kb');
        stopPlayTimer();
        if (scoreSavedThisSession && lastSavedDisplayName) {
          showFinishLeaderboard(lastSavedDisplayName).then(() => revealScoreModal());
        } else {
          showFinish(true);
        }
      }
      requestAnimationFrame(() => {
        syncPlayViewportLayout();
        fitBoardToViewport();
        updateKeyboardActions();
      });
    }

    async function loadQuiz() {
      try {
        hideTitleScreen();
        errorState.classList.add('hidden');
        quizCard.classList.add('hidden');
        await fetchQuizData();
        startQuizUi();
      } catch (e) {
        console.error('InVennTions loadQuiz:', e && e.message, e);
        showError((e && e.message) ? e.message : 'Could not load the quiz. Please try again later.');
      }
    }

    bindModalUi();
    ensureTextFitResizeRefresh();
    ensureBoardViewportFit();
    initTitleScreen();
  </script>
