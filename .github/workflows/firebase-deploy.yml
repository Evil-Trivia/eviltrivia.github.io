name: Deploy to Firebase

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual triggering

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      # actions/checkout@v4 was 403'ing on this org's GITHUB_TOKEN even
      # though the repo is public. We clone unauthenticated instead — the
      # repo is fully public so no token is needed for read access, and
      # this side-steps any org-level token restriction.
      - name: Checkout Repository (anonymous)
        shell: bash
        run: |
          set -euxo pipefail
          git clone --depth=1 "https://github.com/${{ github.repository }}.git" repo
          shopt -s dotglob
          mv repo/* .
          rm -rf repo
          git -c advice.detachedHead=false checkout "${{ github.sha }}" || true
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './functions/package-lock.json'
      
      - name: Install Firebase CLI
        run: npm install -g firebase-tools@latest
      
      - name: Deploy Realtime Database rules
        run: |
          firebase deploy --only database --token "${{ secrets.FIREBASE_TOKEN }}" --project eviltrivia-47664
          
      - name: Install Dependencies
        run: |
          cd functions
          npm ci
      
      - name: Deploy to Firebase (hosting, functions)
        run: |
          firebase deploy --only functions:patreonAuth,hosting --token "${{ secrets.FIREBASE_TOKEN }}" --project eviltrivia-47664
          
      - name: Deployment Summary
        run: |
          echo "🚀 Deployment Complete"
          echo "Realtime Database rules deployed in earlier step."
          echo "Functions URL: https://patreonauth-vapvabofwq-uc.a.run.app"
          echo "Hosting URL: https://eviltrivia-47664.web.app" 